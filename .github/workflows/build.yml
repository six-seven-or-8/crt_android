name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Descargar gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      # ── Debug APK (siempre) ────────────────────────────────
      - name: Compilar Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Subir Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: crt-lineas-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Release AAB firmado (solo en push a main) ──────────
      - name: Compilar Release AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: ./gradlew bundleRelease --no-daemon

      - name: Firmar Release AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d '\n' | base64 --decode > keystore.jks
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"
          rm keystore.jks

      - name: Subir Release AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: crt-lineas-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Resumen
        run: |
          echo "## ✅ Build completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            size=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "### Debug APK: $size" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f app/build/outputs/bundle/release/app-release.aab ]; then
            size=$(du -sh app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "### Release AAB: $size" >> $GITHUB_STEP_SUMMARY
          fi
